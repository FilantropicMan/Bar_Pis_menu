<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bar Pisticci — Menù</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EAD9;
    --ink:#241C15;
    --spritz:#7A2A15;
    --bibite:#4E3520;
    --birre-gold:#B8862E;
    --birre-bg:#1C1710;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', -apple-system, sans-serif;
    min-height:100%;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:40px 20px;
  }
  .logo{
    height:70px;
    width:auto;
    margin-bottom:8px;
  }
  .tagline{
    font-family:'Inter', sans-serif;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:rgba(36,28,21,0.55);
    margin-bottom:36px;
  }
  .cards{
    display:flex;
    flex-direction:column;
    gap:16px;
    width:100%;
    max-width:420px;
  }
  a.card{
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 22px;
    border-radius:6px;
    background:#fff;
    box-shadow:0 1px 2px rgba(36,28,21,0.08), 0 8px 20px rgba(36,28,21,0.10);
    border:1px solid rgba(36,28,21,0.08);
    transition:transform 0.15s ease;
  }
  a.card:active{
    transform:scale(0.98);
  }
  .card .name{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-style:italic;
    font-size:22px;
  }
  .card .arrow{
    font-size:20px;
  }
  #spritz .name{ color:var(--spritz); }
  #spritz .arrow{ color:var(--spritz); }
  #bibite .name{ color:var(--bibite); }
  #bibite .arrow{ color:var(--bibite); }
  #birre{ background:var(--birre-bg); border-color:rgba(217,170,69,0.25); }
  #birre .name{ color:var(--birre-gold); }
  #birre .arrow{ color:var(--birre-gold); }

  footer{
    margin-top:44px;
    font-family:'Inter', sans-serif;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(36,28,21,0.5);
    text-align:center;
  }
</style>
</head>
<body>

  <img class="logo" src="logo.png" alt="Bar Pisticci dal 1968">
  <div class="tagline">Piazza dei Caduti 3 · Pisticci</div>

  <div class="cards">
    <a class="card" id="spritz" href="spritz.html">
      <span class="name">Spritz Menù</span>
      <span class="arrow">→</span>
    </a>
    <a class="card" id="bibite" href="bibite.html">
      <span class="name">Bibite Analcoliche</span>
      <span class="arrow">→</span>
    </a>
    <a class="card" id="birre" href="birre.html">
      <span class="name">Cantina Birre</span>
      <span class="arrow">→</span>
    </a>
  </div>

  <footer>Bar Pisticci · Caffè, Dolci, Gelati</footer>

</body>
</html>
