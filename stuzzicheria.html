<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
<title>Stuzzicheria e Salati — Bar Pisticci</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5EEE1;
    --ink:#2E2113;
    --accent:#B8862E;
    --accent-deep:#8A6118;
    --gold:#C9A227;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', -apple-system, sans-serif;
    min-height:100%;
  }
  body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* subtle paper grain */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.05;
    background-image:
      radial-gradient(circle at 20% 30%, #000 0, transparent 1px),
      radial-gradient(circle at 70% 60%, #000 0, transparent 1px),
      radial-gradient(circle at 40% 80%, #000 0, transparent 1px);
    background-size: 90px 90px, 130px 130px, 110px 110px;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 18px;
    background:rgba(243,234,217,0.86);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(36,28,21,0.12);
  }

  .logo{
    flex:0 0 auto;
    height:40px;
    width:auto;
    display:block;
  }

  .brandblock{
    display:flex;
    flex-direction:column;
    line-height:1.15;
  }
  .brandblock .cat{
    font-family:'Playfair Display', serif;
    font-size:23px;
    font-weight:700;
    font-style:italic;
    color:var(--ink);
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:22px 14px 10px;
  }

  .frame{
    max-width:640px;
    width:100%;
    background:#fff;
    padding:10px;
    border-radius:4px;
    box-shadow:
      0 1px 2px rgba(36,28,21,0.08),
      0 12px 30px rgba(36,28,21,0.14);
    border:1px solid rgba(36,28,21,0.08);
  }
  .frame img{
    display:block;
    width:100%;
    height:auto;
    border-radius:2px;
  }

  .hint{
    margin-top:14px;
    font-family:'Inter', sans-serif;
    font-size:12px;
    letter-spacing:0.4px;
    color:rgba(36,28,21,0.55);
    text-align:center;
  }

  footer{
    text-align:center;
    padding:16px 12px 22px;
    font-family:'Inter', sans-serif;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent-deep);
    opacity:0.75;
  }
  footer .rule{
    width:60px;
    height:1px;
    background:var(--gold);
    margin:0 auto 8px;
    opacity:0.6;
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.png" alt="Bar Pisticci dal 1968">
  <div class="brandblock">
    <div class="cat">Stuzzicheria e Salati</div>
  </div>
</header>

<main>
  <div class="frame">
    <!-- SOSTITUIRE questo src con il link diretto Google Drive dell'immagine -->
    <img src="Stuzzicheria_Bar_Pisticci.jpeg" alt="Stuzzicheria e Salati Bar Pisticci">
  </div>
  <div class="hint">tocca per ingrandire · scorri per leggere bene i prezzi</div>
</main>

<footer>
  <div class="rule"></div>
  Bar Pisticci · Caffè, Dolci, Gelati
</footer>

</body>
</html>
